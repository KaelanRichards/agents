<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agents</title>
    <link rel="stylesheet" href="vendor/xterm.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="vendor/xterm.js"></script>
    <script src="vendor/xterm-addon-fit.js"></script>
  </head>
  <body>
    <div id="app">
      <nav id="rail">
        <div class="brand"><span class="dot"></span> agents</div>
        <button class="nav" data-panel="fleet">Fleet</button>
        <button class="nav" data-panel="agents">Agents</button>
        <button class="nav" data-panel="runs">Runs</button>
        <button class="nav" data-panel="approvals">
          Approvals <span class="badge" id="badge-approvals" hidden>0</span>
        </button>
        <button class="nav" data-panel="queue">Queue</button>
        <button class="nav" data-panel="config">Config</button>
        <button class="nav" data-panel="memory">Memory</button>
        <div class="rail-foot">
          <select id="conn-select" title="Active connection"></select>
          <span id="conn-status" class="status">…</span>
        </div>
      </nav>
      <main id="content"><div class="loading">Loading…</div></main>
    </div>
    <div id="toast" class="toast"></div>
    <div id="term-overlay" hidden>
      <div id="term-head">
        <span id="term-title" class="mono"></span>
        <span class="spacer"></span>
        <button class="btn err" id="term-kill">Kill</button>
        <button class="btn" id="term-close">Close</button>
      </div>
      <div id="term-host"></div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
