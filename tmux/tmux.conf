# tmux.conf — sensible defaults for remote agent sessions.
# Symlinked to ~/.config/tmux/tmux.conf by bootstrap.sh.

# truecolor (so starship / delta / agent output render correctly)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*256col*:RGB,xterm-ghostty:RGB"

# clipboard over SSH via OSC52 — yanks reach your local machine's clipboard
set -g set-clipboard on

# general
set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10
set -g focus-events on
setw -g mode-keys vi

# splits open in the current path; intuitive | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# status bar
set -g status-interval 5
set -g status-style "bg=default"
set -g status-justify left
set -g status-left "#[bold] #S "
set -g status-left-length 30
set -g status-right "#[fg=cyan]#H #[fg=default]%H:%M "
