# Copy to <project>/.github/workflows/maintenance.yml — a weekly autonomous agent (Tier-3).
# Needs ANTHROPIC_API_KEY in the repo's Actions secrets. Tune the prompt to your task.
name: weekly-maintenance
on:
  schedule:
    - cron: "0 8 * * 1" # Mondays 08:00 UTC
  workflow_dispatch:

jobs:
  maintain:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Bump outdated dependencies that are safe to update, run the test suite,
            and open a PR titled "chore: weekly dependency update" summarizing the
            changes. If there is nothing safe to update, do nothing.
