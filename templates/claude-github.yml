# Copy to <project>/.github/workflows/claude.yml — responds to @claude in issues/PRs
# and reviews newly-opened PRs. Setup: run `claude /install-github-app` in the repo, OR
# install the Claude GitHub App manually and add ANTHROPIC_API_KEY to Actions secrets.
name: claude
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened]

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
